<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Formação</title>

    <link rel="stylesheet" href="css/style.css">
</head>

<body>
    <!-- MENU FIXO -->
    <header>
        <p class="logo">Michele Ye</p>

        <nav>
            <ul class="menu">

                <li>
                    <a href="sobre.html">Sobre mim</a>
                </li>

                <li>
                    <a href="formacao.html">Formação</a>
                </li>

                <li>
                    <a href="portfolio.html">Portfólio</a>
                </li>

                <li>
                    <a href="contato.html">Contato</a>
                </li>

            </ul>
        </nav>
    </header>

    <!-- CONTEÚDO PRINCIPAL -->
    <main> 
        <section id="contato" class="contato">

            <div class="titulo-secao">
                <h2>Contato</h2>
                <hr class="linha-meio">
                <p>Entre em contato comigo através do formulário abaixo.</p>
            </div>

            <!-- Formulário de Contato -->
            <form id="formContato" class="formulario-contato">
                <div class="grupo-formulario">
                    <label for="nome">Nome:</label>
                    <input 
                        type="text" 
                        id="nome" 
                        name="nome" 
                        placeholder="Digite seu nome"
                    >
                </div>

                <div class="grupo-formulario">
                    <label for="email">E-mail:</label>
                    <input 
                        type="email" 
                        id="email" 
                        name="email" 
                        placeholder="Digite seu e-mail"
                    >
                </div>

                <div class="grupo-formulario">
                    <label for="mensagem">Mensagem:</label>
                    <textarea 
                        id="mensagem" 
                        name="mensagem" 
                        rows="6"
                        placeholder="Digite sua mensagem"
                    ></textarea>
                </div>

                <!-- Botão -->
                <button type="submit" class="btn-enviar">
                    Enviar Mensagem
                </button>

                <!-- Mensagem de retorno do JS -->
                <p id="mensagem-status"></p>

            </form>

        </section>
        
    </main>

    <script src="js/script_contato.js"></script>

</body>

</html>
